<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Listener UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        /* Custom scrollbar for pre blocks */
        pre::-webkit-scrollbar { height: 8px; width: 8px; }
        pre::-webkit-scrollbar-track { background: #0f172a; }
        pre::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        pre::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 glass p-6 rounded-2xl shadow-xl gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Webhook Dashboard</h1>
                <p class="text-slate-400 text-sm">
                    Listening on <code class="text-indigo-400 bg-slate-800 px-2 py-1 rounded">POST /webhook</code>
                </p>
                <p class="text-slate-400 text-sm mt-1">
                    Header required: <code class="text-emerald-400 bg-slate-800 px-2 py-1 rounded">x-webhook-auth: secret-token</code>
                </p>
            </div>
            <div class="flex items-center space-x-3 bg-slate-800/80 px-4 py-2 rounded-lg border border-slate-700">
                <div class="w-3 h-3 bg-emerald-500 rounded-full pulse shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                <span class="text-sm font-medium text-emerald-400">Live Connection</span>
            </div>
        </header>

        <div id="events-container" class="space-y-6">
            <!-- Events will be injected here -->
            <div id="empty-state" class="text-center py-16 text-slate-500 glass rounded-2xl border border-dashed border-slate-700 transition-opacity duration-300">
                <svg class="mx-auto h-12 w-12 text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <h3 class="mt-2 text-sm font-semibold text-slate-300">No Webhooks Yet</h3>
                <p class="mt-1 text-sm text-slate-500">Send a POST request to get started and they will appear here in real-time.</p>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('events-container');
        const emptyState = document.getElementById('empty-state');
        
        // Fetch historical hooks
        fetch('/api/webhooks')
            .then(res => res.json())
            .then(data => {
                if(data && data.length > 0) {
                    if (emptyState) emptyState.remove();
                    data.forEach(item => renderEvent(item, false));
                }
            })
            .catch(err => console.error("Failed fetching config", err));

        // Connect to SSE for real-time events
        const evtSource = new EventSource('/events');
        
        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (emptyState && document.getElementById('empty-state')) {
                emptyState.remove(); // Safely remove empty state
            }
            // prepend to top
            renderEvent(data, true);
        };

        evtSource.onerror = function(err) {
            console.error("EventSource failed:", err);
        };

        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'text-blue-400'; // number
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'text-emerald-400'; // key
                    } else {
                        cls = 'text-green-300'; // string
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'text-purple-400'; // boolean
                } else if (/null/.test(match)) {
                    cls = 'text-pink-400'; // null
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function renderEvent(data, prepend = false) {
            const el = document.createElement('div');
            el.className = 'glass rounded-2xl p-6 shadow-lg border border-slate-700 transform transition-all duration-500 ease-out translate-y-4 opacity-0';
            el.id = 'event-' + data.id;
            
            const date = new Date(data.date).toLocaleString([], { dateStyle: 'medium', timeStyle: 'medium' });
            
            // Syntax highlight structures
            const highlightedHeaders = syntaxHighlight(data.headers);
            const highlightedBody = syntaxHighlight(data.body);

            el.innerHTML = `
                <div class="flex flex-wrap justify-between items-center mb-4 border-b border-slate-700/50 pb-4 gap-2">
                    <div class="flex items-center space-x-3">
                        <span class="bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-md font-mono text-sm font-semibold border border-indigo-500/30">${data.method}</span>
                        <span class="text-slate-400 font-mono text-xs">ID: ${data.id}</span>
                    </div>
                    <div class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded-full border border-slate-700 flex items-center gap-2">
                        <svg class="w-3 h-3 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        ${date}
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- Headers -->
                    <div class="flex flex-col">
                        <h3 class="text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-2">
                            <svg class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                            Headers
                        </h3>
                        <div class="bg-[#0b1121] rounded-xl p-4 overflow-auto border border-slate-800 flex-grow max-h-96 custom-scrollbar">
                            <pre class="text-sm font-mono m-0">${highlightedHeaders}</pre>
                        </div>
                    </div>
                    
                    <!-- Payload (Body) -->
                    <div class="flex flex-col">
                        <h3 class="text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-2">
                            <svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                            </svg>
                            Payload Configuration (Body)
                        </h3>
                        <div class="bg-[#0b1121] rounded-xl p-4 overflow-auto border border-slate-800 flex-grow max-h-96 custom-scrollbar">
                            <pre class="text-sm font-mono m-0">${highlightedBody}</pre>
                        </div>
                    </div>
                </div>
            `;
            
            if (prepend) {
                container.prepend(el);
            } else {
                container.appendChild(el);
            }
            
            // Trigger animation
            setTimeout(() => {
                el.classList.remove('translate-y-4', 'opacity-0');
            }, 50);
            
            // Optionally remove old events if more than 50
            const maxElements = 50;
            if (container.children.length > maxElements) {
                container.removeChild(container.lastChild);
            }
        }
    </script>
</body>
</html>
